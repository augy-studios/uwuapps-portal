<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ccffcc" />
  <title>UwU Suite — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #ccffcc;
      color: #1a1a2e;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      text-align: center;
    }
    img { width: 96px; height: 96px; border-radius: 24px; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: #444; max-width: 320px; line-height: 1.6; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #1a1a2e;
      color: #ccffcc;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <img src="/UUS-192.png" alt="UwU Suite logo" />
  <h1>You're offline</h1>
  <p>UwU Suite needs an internet connection for most features. Check your connection and try again.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
